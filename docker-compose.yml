version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: bizpilot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bizpilot
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bizpilot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: bizpilot-api
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@postgres-db:5432/bizpilot?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    depends_on:
      - postgres-db
      - redis
    restart: unless-stopped

volumes:
  postgres-data:
